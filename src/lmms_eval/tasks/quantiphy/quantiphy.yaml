dataset_path: parquet
dataset_kwargs:
  data_files:
    validation: "data/evaluation/quantiphy/validation_dataset.parquet"
  
task: "quantiphy"
test_split: validation
output_type: generate_until

doc_to_visual: !function utils.quantiphy_doc_to_visual
doc_to_text: !function utils.quantiphy_doc_to_text
doc_to_target: "answer" 

generation_kwargs:
  max_new_tokens: 64
  temperature: 0
  top_p: 1.0
  do_sample: false

process_results: !function utils.quantiphy_process_results

metric_list:
  # 只有一个综合指标
  - metric: quantiphy_mra
    aggregation: !function utils.quantiphy_aggregate_results
    higher_is_better: true

metadata:
  - version: 2.0 # Logic Updated